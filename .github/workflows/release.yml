name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-android:
    name: Android APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle
      - name: Enable Gradle Wrapper
        shell: bash
        run: |
          set -euo pipefail
          sed -i 's/\r$//' gradlew
          chmod +x gradlew
      - name: Prepare release signing keystore
        shell: bash
        env:
          APP_RELEASE_JKS_BASE64: ${{ secrets.APP_RELEASE_JKS_BASE64 }}
        run: |
          set -euo pipefail
          if [ -z "${APP_RELEASE_JKS_BASE64}" ]; then
            echo "Missing APP_RELEASE_JKS_BASE64 secret"
            exit 1
          fi
          printf '%s' "${APP_RELEASE_JKS_BASE64}" | base64 --decode > app-release.jks
          chmod 600 app-release.jks
      - name: Build release APK
        run: ./gradlew :app:assembleRelease --no-daemon
        env:
          APP_RELEASE_STORE_FILE: app-release.jks
          APP_RELEASE_STORE_PASSWORD: ${{ secrets.APP_RELEASE_STORE_PASSWORD }}
          APP_RELEASE_KEY_ALIAS: ${{ secrets.APP_RELEASE_KEY_ALIAS }}
          APP_RELEASE_KEY_PASSWORD: ${{ secrets.APP_RELEASE_KEY_PASSWORD }}
      - name: Stage Android artifact
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          APK_PATH="$(find . -type f -path '*/outputs/apk/release/*.apk' -name '*release*.apk' | head -n 1)"
          if [ -z "$APK_PATH" ]; then
            echo "Release APK not found under outputs/apk/release"
            find . -maxdepth 6 -type f -name '*.apk' -print
            exit 1
          fi
          cp "$APK_PATH" "dist/EaraAsmrPlayer-${GITHUB_REF_NAME}-android.apk"
      - uses: actions/upload-artifact@v4
        with:
          name: android-release
          path: dist/EaraAsmrPlayer-*-android.apk
          if-no-files-found: error

  build-windows:
    name: Windows MSI
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle
      - name: Resolve package version
        shell: bash
        run: echo "PACKAGE_VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"
      - name: Build Windows MSI
        shell: cmd
        run: gradlew.bat :desktopApp:packageMsi --no-daemon -PpackageVersion=%PACKAGE_VERSION%
      - name: Stage Windows artifact
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          MSI_PATH="$(find desktopApp/build/compose/binaries/main/msi -type f -name '*.msi' | head -n 1)"
          if [ -z "$MSI_PATH" ]; then
            echo "Windows MSI not found"
            find desktopApp/build -type f -name '*.msi' -print || true
            exit 1
          fi
          cp "$MSI_PATH" "dist/EaraAsmrPlayer-${GITHUB_REF_NAME}-windows.msi"
      - uses: actions/upload-artifact@v4
        with:
          name: windows-release
          path: dist/EaraAsmrPlayer-*-windows.msi
          if-no-files-found: error

  build-linux:
    name: Linux DEB
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle
      - name: Enable Gradle Wrapper
        shell: bash
        run: |
          set -euo pipefail
          sed -i 's/\r$//' gradlew
          chmod +x gradlew
      - name: Resolve package version
        run: echo "PACKAGE_VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"
      - name: Build Linux DEB
        run: ./gradlew :desktopApp:packageDeb --no-daemon -PpackageVersion="$PACKAGE_VERSION"
      - name: Stage Linux artifact
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          DEB_PATH="$(find desktopApp/build/compose/binaries/main/deb -type f -name '*.deb' | head -n 1)"
          if [ -z "$DEB_PATH" ]; then
            echo "Linux DEB not found"
            find desktopApp/build -type f -name '*.deb' -print || true
            exit 1
          fi
          cp "$DEB_PATH" "dist/EaraAsmrPlayer-${GITHUB_REF_NAME}-linux.deb"
      - uses: actions/upload-artifact@v4
        with:
          name: linux-release
          path: dist/EaraAsmrPlayer-*-linux.deb
          if-no-files-found: error

  build-macos:
    name: macOS DMG
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle
      - name: Enable Gradle Wrapper
        run: chmod +x gradlew
      - name: Resolve package version
        run: echo "PACKAGE_VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"
      - name: Build macOS DMG
        run: ./gradlew :desktopApp:packageDmg --no-daemon -PpackageVersion="$PACKAGE_VERSION"
      - name: Stage macOS artifact
        run: |
          set -euo pipefail
          mkdir -p dist
          DMG_PATH="$(find desktopApp/build/compose/binaries/main/dmg -type f -name '*.dmg' | head -n 1)"
          if [ -z "$DMG_PATH" ]; then
            echo "macOS DMG not found"
            find desktopApp/build -type f -name '*.dmg' -print || true
            exit 1
          fi
          cp "$DMG_PATH" "dist/EaraAsmrPlayer-${GITHUB_REF_NAME}-macos.dmg"
      - uses: actions/upload-artifact@v4
        with:
          name: macos-release
          path: dist/EaraAsmrPlayer-*-macos.dmg
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs:
      - build-android
      - build-windows
      - build-linux
      - build-macos
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: List release artifacts
        run: find dist -type f -print
      - uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          overwrite: true
          files: |
            dist/EaraAsmrPlayer-${{ github.ref_name }}-android.apk
            dist/EaraAsmrPlayer-${{ github.ref_name }}-windows.msi
            dist/EaraAsmrPlayer-${{ github.ref_name }}-linux.deb
            dist/EaraAsmrPlayer-${{ github.ref_name }}-macos.dmg
