name: Desktop Builds

on:
  workflow_dispatch:
  push:
    branches: [main, cursor/**]
    paths:
      - 'desktopApp/**'
      - 'shared/**'
      - 'build.gradle.kts'
      - 'settings.gradle.kts'
      - 'gradle/**'

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - name: Build Windows MSI
        shell: cmd
        run: gradlew.bat :desktopApp:packageMsi --no-daemon
      - name: Upload Windows MSI
        uses: actions/upload-artifact@v4
        with:
          name: eara-windows-msi
          path: desktopApp/build/compose/binaries/main/msi/*.msi

  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - name: Build Linux DEB
        run: ./gradlew :desktopApp:packageDeb --no-daemon
      - name: Upload Linux DEB
        uses: actions/upload-artifact@v4
        with:
          name: eara-linux-deb
          path: desktopApp/build/compose/binaries/main/deb/*.deb
